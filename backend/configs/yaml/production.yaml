# Production Configuration for k4-chat
# This file contains production-specific settings
# Secrets and environment-specific values are loaded from .env.production
# will hide a lot more config values through env vars whenever i get to that point
# EMPHASIS: Not making it to this point for clonathon

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "120s"
  shutdown_timeout: "30s"
  max_header_bytes: 1048576 # 1MB
  enable_profiling: false  # Disabled in production
  trusted_proxies: []  # Configure based on  load balancer (won't have implemented for clonathon)
  health_check_path: "/health"
  metrics_path: "/metrics"

database:
  postgres:
    host: "localhost"  # Overridden by POSTGRES_HOST
    port: 5432
    database: "k4chat"  # Overridden by POSTGRES_DB
    username: "postgres"  # Overridden by POSTGRES_USER
    ssl_mode: "require"  # Enforce SSL in production
    max_open_conns: 100  # Higher for production
    max_idle_conns: 25
    conn_max_lifetime: "1h"
    conn_max_idle_time: "15m"
    health_check_period: "30s"
    query_timeout: "15s"  # Stricter timeout
    migration_path: "internal/database/migrations"
    enable_logging: false  # Disable query logging in production
  redis:
    enabled: true
    host: "localhost"  # Overridden by REDIS_HOST
    port: 6379
    username: ""  # Overridden by REDIS_USERNAME if using ACL
    password: ""  # Overridden by REDIS_PASSWORD
    database: 0
    key_prefix: ""  # Not used for database operations
    default_ttl: "0s"  # Not used for database operations
    pool_size: 50  # Higher for production
    min_idle_conns: 10
    max_retries: 5
    dial_timeout: "5s"
    read_timeout: "2s"  # Faster timeouts
    write_timeout: "2s"
    pool_timeout: "3s"
    idle_timeout: "10m"
    max_conn_age: "1h"
    circuit_breaker:
      enabled: true
      failure_threshold: 5
      reset_timeout: "30s"

redis:
  enabled: true
  host: "localhost"  # Overridden by REDIS_HOST
  port: 6379
  username: ""  # Overridden by REDIS_USERNAME if using ACL
  password: ""  # Overridden by REDIS_PASSWORD
  database: 1
  key_prefix: "k4chat:"
  default_ttl: "1h"
  pool_size: 50
  min_idle_conns: 10
  max_retries: 5
  dial_timeout: "5s"
  read_timeout: "2s"
  write_timeout: "2s"
  pool_timeout: "3s"
  idle_timeout: "10m"
  max_conn_age: "1h"
  circuit_breaker:
    enabled: true
    failure_threshold: 5
    reset_timeout: "30s"

auth:
  jwt:
    access_token_ttl: "15m"  # Overridden by .env
    refresh_token_ttl: "7d"  # Overridden by .env
    issuer: "k4-chat"
    audience: "k4-chat-users"
    algorithm: "HS256"
  sessions:
    max_sessions_per_user: 5  # Stricter limit
    session_timeout: "24h"
    refresh_threshold: "1h"
    cleanup_interval: "5m"
    secure_cookies: true  # Required for HTTPS
    same_site_policy: "Strict"
    device_binding: true
    fingerprint_validation: true
  password_policy:
    min_length: 12  # Stronger passwords
    require_uppercase: true
    require_lowercase: true
    require_numbers: true
    require_symbols: true
    max_attempts: 5
    lockout_duration: "30m"  # Longer lockout
  rate_limiting:
    login_attempts:
      requests: 5  # Strict limits
      window: "1m"
      burst: 2
    token_refresh:
      requests: 60
      window: "1m"
      burst: 5
    password_reset:
      requests: 3
      window: "1h"
      burst: 1
    account_creation:
      requests: 5
      window: "1h"
      burst: 1
  security:
    require_two_factor: false  # plan for 2FA, but won't be implemented for clonathon
    allowed_origins: []  # will be configured when app is distributed, but also won't get to this point for clonathon
    block_suspicious_logins: true
    session_rotation_interval: "6h"

logger:
  level: "info"
  format: "json"
  output: "stdout"
  file_path: "/var/log/k4chat/app.log"
  max_size_mb: 100
  max_backups: 10
  max_age_days: 30
  compress: true
  enable_sampling: true
  sampling_initial: 100
  sampling_thereafter: 1000

feature_flags:
  enable_websocket: true
  enable_file_uploads: true
  enable_image_generation: true
  enable_web_search: true
  enable_user_profiles: true
  enable_chat_sharing: true
  enable_analytics: true
  enable_metrics: true
  enable_debug_mode: false

rate_limiting:
  enabled: true
  storage: "redis"
  key_generator: "ip"
  whitelisted_ips: [] # TODO: debating about even needing this, just adding this as a reminder
  default_limits:
    api:
      requests: 100
      window: "1m"
      burst: 20
    websocket:
      requests: 50
      window: "1m"
      burst: 10
  per_user_limits:
    free:
      requests: 50
      window: "1m"
      burst: 10
    premium:
      requests: 200
      window: "1m"
      burst: 40
    admin:
      requests: 1000
      window: "1m"
      burst: 100

middleware:
  security:
    enable_hsts: true
    hsts_max_age: 31536000  # 1 year
    enable_frame_options: true
    frame_options_value: "DENY"
    enable_content_type_no_sniff: true
    csp_policy: "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss:; font-src 'self';"
    allowed_hosts: []  # aint making it this far for clonathon
  cors:
    enabled: true
    allowed_origins: []  # aint making it this far for clonathon
    allowed_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    allowed_headers: ["Accept", "Authorization", "Content-Type", "X-CSRF-Token"]
    exposed_headers: ["X-Total-Count"]
    allow_credentials: true
    max_age: 86400
  compression:
    enabled: true
    level: 6  # TODO: needs performance/benchmark testing
    min_length: 1024
    types: ["text/html", "text/css", "text/javascript", "application/json", "application/xml"]
  timeout:
    read: "30s"
    write: "30s"
    request: "30s"

actors:
  supervisor:
    max_restarts: 3  # FIX: need to test 
    restart_window: "5m"
    shutdown_timeout: "30s"
    health_check_interval: "2m"
  user_manager:
    max_active_users: 10000  # Thinking bucket style algorithm for each user manager
    idle_timeout: "30m"
    shutdown_timeout: "30s"
    health_check_interval: "2m"
    cleanup_interval: "5m"
    max_connections_per_user: 3 # TODO: need to test, user active ws connections should not be high generally
  connection:
    ping_interval: "30s"
    ping_timeout: "10s"
    write_timeout: "10s"
    read_timeout: "60s"
    max_message_size: 65536  # 64KB
    buffer_size: 4096  # Larger buffer for production
    compression_level: 6
  chat_session:
    max_sessions_per_user: 100
    idle_timeout: "2h"
    message_batch_size: 100  # Larger batches for efficiency
    history_limit: 10000
    auto_save_interval: "5m"
  llm_manager:
    default_model: "gpt-4"  # first model that came to mind, will tweak later
    timeout: "30s"
    max_concurrent_requests: 50  # Higher concurrency
    retry_attempts: 3
    retry_delay: "2s"
    providers:
      # TODO: need to test and tweak these, just adding these as a placeholder
      openai:
        enabled: true
        base_url: "https://api.openai.com/v1"
        model: "gpt-4"
        max_tokens: 4096
        temperature: 0.7
        top_p: 1.0
        timeout: "30s"
      anthropic:
        enabled: true
        base_url: "https://api.anthropic.com"
        model: "claude-3-sonnet-20240229"
        max_tokens: 4096
        temperature: 0.7
        timeout: "30s"
  tools_manager:
    enabled: true
    timeout: "30s"
    max_concurrent: 10
    tools:
     # TODO: nowhere near this point for clonathon, but adding these as a placeholder
      web_search:
        enabled: true
        timeout: "15s"
        max_requests_per_hour: 1000
        config:
          engine: "searxng"
          max_results: 10
      image_generation:
        enabled: true
        timeout: "60s"
        max_requests_per_hour: 100
        config:
          provider: "dalle"
          model: "dall-e-3"
          size: "1024x1024" 