# Default Configuration
# minimal fallback configuration used when environment-specific files don't exist

server:
  host: "localhost"
  port: 8080
  read_timeout: "30s"
  write_timeout: "30s"
  read_header_timeout: "30s"
  idle_timeout: "60s"
  shutdown_timeout: "30s"
  max_header_bytes: 1048576
  enable_profiling: false
  trusted_proxies: []
  health_check_path: "/health"
  metrics_path: "/metrics"

database:
  postgres:
    host: "localhost"
    port: 5432
    database: "k4chat"
    username: "postgres"
    ssl_mode: "disable"
    max_open_conns: 25
    max_idle_conns: 5
    conn_max_lifetime: "1h"
    conn_max_idle_time: "30m"
    health_check_period: "1m"
    query_timeout: "30s"
    migration_path: "internal/database/migrations"
    enable_logging: false
  redis:
    enabled: true
    host: "localhost"
    port: 6379
    username: ""
    password: "" 
    database: 0
    key_prefix: "k4chat:"
    default_ttl: "1h"
    pool_size: 10
    min_idle_conns: 5
    max_retries: 3
    dial_timeout: "5s"
    read_timeout: "3s"
    write_timeout: "3s"
    pool_timeout: "4s"
    idle_timeout: "5m"
    max_conn_age: "30m"
    circuit_breaker:
      enabled: true
      failure_threshold: 5
      reset_timeout: "30s"

auth:
  jwt:
    access_token_ttl: "15m"
    refresh_token_ttl: "7d"
    issuer: "k4-chat"
    audience: "k4-chat-users"
    algorithm: "HS256"
  sessions:
    max_sessions_per_user: 5
    session_timeout: "24h"
    refresh_threshold: "1h"
    cleanup_interval: "5m"
    secure_cookies: false
    same_site_policy: "Lax"
    device_binding: false
    fingerprint_validation: false
  password_policy:
    min_length: 8
    require_uppercase: true
    require_lowercase: true
    require_numbers: true
    require_symbols: false
    max_attempts: 5
    lockout_duration: "15m"
  rate_limiting:
    login_attempts:
      requests: 10
      window: "1m"
      burst: 3
    token_refresh:
      requests: 60
      window: "1m"
      burst: 5
    password_reset:
      requests: 5
      window: "1h"
      burst: 1
    account_creation:
      requests: 5
      window: "1h"
      burst: 1
  security:
    require_two_factor: false
    allowed_origins: []
    block_suspicious_logins: true
    session_rotation_interval: "12h"

logger:
  level: "info"
  format: "console"
  output: "stdout"
  file_path: ""
  max_size_mb: 100
  max_backups: 3
  max_age_days: 7
  compress: false
  enable_sampling: false
  sampling_initial: 100
  sampling_thereafter: 100

feature_flags:
  enable_websocket: true
  enable_file_uploads: false
  enable_image_generation: false
  enable_web_search: false
  enable_user_profiles: true
  enable_chat_sharing: false
  enable_analytics: false
  enable_metrics: true
  enable_debug_mode: false

rate_limiting:
  enabled: true
  storage: "memory"
  key_generator: "ip"
  whitelisted_ips: []
  default_limits:
    api:
      requests: 100
      window: "1m"
      burst: 20
    websocket:
      requests: 50
      window: "1m"
      burst: 10
  per_user_limits:
    free:
      requests: 50
      window: "1m"
      burst: 10
    premium:
      requests: 100
      window: "1m"
      burst: 20

middleware:
  security:
    enable_hsts: false
    hsts_max_age: 0
    enable_frame_options: true
    frame_options_value: "SAMEORIGIN"
    enable_content_type_no_sniff: true
    csp_policy: "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; font-src 'self';"
    allowed_hosts: []
  cors:
    enabled: true
    allowed_origins: []
    allowed_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    allowed_headers: ["Accept", "Authorization", "Content-Type", "X-CSRF-Token"]
    exposed_headers: []
    allow_credentials: true
    max_age: 86400
  compression:
    enabled: true
    level: 3
    min_length: 1024
    types: ["text/html", "text/css", "text/javascript", "application/json"]
  timeout:
    read: "30s"
    write: "30s"
    request: "30s"

actors:
  supervisor:
    max_restarts: 5
    restart_window: "2m"
    shutdown_timeout: "30s"
    health_check_interval: "1m"
  user_manager:
    max_active_users: 1000
    idle_timeout: "30m"
    shutdown_timeout: "30s"
    health_check_interval: "1m"
    cleanup_interval: "5m"
    max_connections_per_user: 5
  connection:
    ping_interval: "30s"
    ping_timeout: "10s"
    write_timeout: "10s"
    read_timeout: "60s"
    max_message_size: 65536
    buffer_size: 1024
    compression_level: 3
  chat_session:
    max_sessions_per_user: 50
    idle_timeout: "1h"
    message_batch_size: 50
    history_limit: 5000
    auto_save_interval: "2m"
  llm_manager:
    default_model: "gpt-3.5-turbo"
    timeout: "30s"
    max_concurrent_requests: 10
    retry_attempts: 3
    retry_delay: "1s"
    providers:
      openai:
        enabled: true
        base_url: "https://api.openai.com/v1"
        model: "gpt-3.5-turbo"
        max_tokens: 4096
        temperature: 0.7
        top_p: 1.0
        timeout: "30s"
      anthropic:
        enabled: false
        base_url: "https://api.anthropic.com"
        model: "claude-3-sonnet-20240229"
        max_tokens: 4096
        temperature: 0.7
        timeout: "30s"
  tools_manager:
    enabled: false
    timeout: "30s"
    max_concurrent: 5
    tools:
      web_search:
        enabled: false
        timeout: "10s"
        max_requests_per_hour: 100
        config:
          engine: "searxng"
          max_results: 10
      image_generation:
        enabled: false
        timeout: "60s"
        max_requests_per_hour: 50
        config:
          provider: "dalle"
          model: "dall-e-3"
          size: "1024x1024" 