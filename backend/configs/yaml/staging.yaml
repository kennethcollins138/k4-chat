# Staging Configuration for k4-chat
# mirrors production but with relaxed settings for QA testing

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: "30s"
  write_timeout: "30s"
  read_header_timeout: "30s"
  idle_timeout: "120s"
  shutdown_timeout: "30s"
  max_header_bytes: 1048576
  enable_profiling: true  # profiling for performance testing
  trusted_proxies: []
  health_check_path: "/health"
  metrics_path: "/metrics"

database:
  postgres:
    host: "localhost"  # Overridden by POSTGRES_HOST
    port: 5432
    database: "k4chat_staging"  # Separate staging database
    username: "postgres"  # Overridden by POSTGRES_USER
    ssl_mode: "require"  # should use like production
    max_open_conns: 50  # Between dev and prod
    max_idle_conns: 15
    conn_max_lifetime: "1h"
    conn_max_idle_time: "15m"
    health_check_period: "30s"
    query_timeout: "20s"
    migration_path: "internal/database/migrations"
    enable_logging: true  # Keep logging for debugging
  redis:
    enabled: true
    host: "localhost"
    port: 6379
    username: "" 
    password: ""
    database: 2  # separate staging database
    key_prefix: ""  # Not used for database operations
    key_prefix: "k4chat:staging:"
    default_ttl: "1h"
    pool_size: 30
    min_idle_conns: 8
    max_retries: 3
    dial_timeout: "5s"
    read_timeout: "3s"
    write_timeout: "3s"
    pool_timeout: "4s"
    idle_timeout: "10m"
    max_conn_age: "1h"
    circuit_breaker:
      enabled: true
      failure_threshold: 8
      reset_timeout: "20s"

auth:
  jwt:
    access_token_ttl: "15m"  # simulate productionn
    refresh_token_ttl: "7d"
    issuer: "k4-chat-staging"
    audience: "k4-chat-staging-users"
    algorithm: "HS256"
  sessions:
    max_sessions_per_user: 8  # slightly more relaxed than production
    session_timeout: "24h"
    refresh_threshold: "1h"
    cleanup_interval: "5m"
    secure_cookies: true  # simulate production
    same_site_policy: "Strict"
    device_binding: true
    fingerprint_validation: true
  password_policy:  # simulate production
    min_length: 10  # slightly relaxed from production
    require_uppercase: true
    require_lowercase: true
    require_numbers: true
    require_symbols: true
    max_attempts: 8  # More attempts for QA testing
    lockout_duration: "15m"
  rate_limiting:
    login_attempts:
      requests: 10  # Relaxed for testing
      window: "1m"
      burst: 3
    token_refresh:
      requests: 80
      window: "1m"
      burst: 8
    password_reset:
      requests: 5
      window: "1h"
      burst: 2
    account_creation:
      requests: 10
      window: "1h"
      burst: 3
  security:
    require_two_factor: false  # Usually disabled in staging
    allowed_origins: ["https://staging.k4chat.com"]  # Your staging domain
    block_suspicious_logins: false  # Relaxed for testing
    session_rotation_interval: "12h"

logger:
  level: "debug"
  format: "json"
  output: "stdout"
  file_path: "/var/log/k4chat/staging.log"
  max_size_mb: 100
  max_backups: 5
  max_age_days: 14
  compress: true
  enable_sampling: false
  sampling_initial: 100
  sampling_thereafter: 100

feature_flags:
  enable_websocket: true
  enable_file_uploads: true
  enable_image_generation: true
  enable_web_search: true
  enable_user_profiles: true
  enable_chat_sharing: true
  enable_analytics: true
  enable_metrics: true
  enable_debug_mode: true

rate_limiting:
  enabled: true
  storage: "redis"
  key_generator: "ip"
  whitelisted_ips: []
  default_limits:
    api:
      requests: 200
      window: "1m"
      burst: 40
    websocket:
      requests: 100
      window: "1m"
      burst: 20
  per_user_limits:
    free:
      requests: 100
      window: "1m"
      burst: 20
    premium:
      requests: 300
      window: "1m"
      burst: 60
    admin:
      requests: 1000
      window: "1m"
      burst: 100

middleware:
  security:
    enable_hsts: true
    hsts_max_age: 86400  # 1 day
    enable_frame_options: true
    frame_options_value: "SAMEORIGIN"
    enable_content_type_no_sniff: true
    csp_policy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss:; font-src 'self';"
    allowed_hosts: ["staging.k4chat.com"]
  cors:
    enabled: true
    allowed_origins: ["https://staging-frontend.k4chat.com"]
    allowed_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
    allowed_headers: ["Accept", "Authorization", "Content-Type", "X-CSRF-Token", "X-Debug-Mode"]
    exposed_headers: ["X-Total-Count", "X-Debug-Info"]
    allow_credentials: true
    max_age: 86400
  compression:
    enabled: true
    level: 4
    min_length: 1024
    types: ["text/html", "text/css", "text/javascript", "application/json", "application/xml"]
  timeout:
    read: "30s"
    write: "30s"
    request: "30s"

actors:
  supervisor:
    max_restarts: 5
    restart_window: "3m"
    shutdown_timeout: "30s"
    health_check_interval: "1m"
  user_manager:
    max_active_users: 5000
    idle_timeout: "20m"
    shutdown_timeout: "30s"
    health_check_interval: "1m"
    cleanup_interval: "3m"
    max_connections_per_user: 8
  connection:
    ping_interval: "30s"
    ping_timeout: "10s"
    write_timeout: "10s"
    read_timeout: "60s"
    max_message_size: 65536
    buffer_size: 2048
    compression_level: 4
  chat_session:
    max_sessions_per_user: 150
    idle_timeout: "90m"
    message_batch_size: 75
    history_limit: 8000
    auto_save_interval: "3m"
  llm_manager:
    default_model: "gpt-4" #prolly spin up a self hosted container for this 
    timeout: "45s"
    max_concurrent_requests: 25
    retry_attempts: 3
    retry_delay: "1s"
    providers:
      openai:
        enabled: true
        base_url: "https://api.openai.com/v1"
        model: "gpt-3.5-turbo"
        max_tokens: 4096
        temperature: 0.7
        top_p: 1.0
        timeout: "45s"
      anthropic:
        enabled: true
        base_url: "https://api.anthropic.com"
        model: "claude-3-haiku-20240307"  # Cheaper Claude model
        max_tokens: 4096
        temperature: 0.7
        timeout: "45s"
  tools_manager:
    enabled: true
    timeout: "30s"
    max_concurrent: 8
    tools:
      web_search:
        enabled: true
        timeout: "15s"
        max_requests_per_hour: 500  # Generous for testing
        config:
          engine: "searxng"
          max_results: 10
      image_generation:
        enabled: true
        timeout: "60s"
        max_requests_per_hour: 50  # Moderate for testing
        config:
          provider: "dalle"
          model: "dall-e-2"  # Cheaper model for staging
          size: "512x512" 